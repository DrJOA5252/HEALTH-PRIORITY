  <style>
    :root { --bg: #0b1120; --card: #1e293b; --accent: #6366f1; --text: #f1f5f9; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 1.5rem; text-align: center; }

    .btn { display: block; padding: 1.25rem; border-radius: 16px; text-decoration: none; font-weight: 600; background: var(--card); color: var(--text); border: 1px solid rgba(255,255,255,0.05); }
    .btn-intake { background: var(--accent); box-shadow: 0 4px 14px rgba(99,102,241,0.3); }
    .btn-sub { display: block; font-size: 0.75rem; font-weight: 400; opacity: 0.7; margin-top: 5px; }
    .guides-container { display: flex; gap: 1rem; justify-content: center; margin-top: 2rem; }
    .guide-link { font-size: 0.8rem; color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: 0.2s; }
    .guide-link:hover { border-bottom-color: var(--accent); }
    .footer { margin-top: 3rem; font-size: 0.7rem; color: #64748b; letter-spacing: 1px; text-transform: uppercase; }
  </style>
</head>
